<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasapp.online</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("hasap_user_settings");
          if (!raw) return;
          var o = JSON.parse(raw);
          if (o && o.uiTheme === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
